version: '3.8'

services:
  app:
    image: capturalead-app:latest
    build: .
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - /opt/capturalead:/app
    networks:
      - internal
      - shared-net
    deploy:
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=shared-net"
        - "traefik.http.routers.leadtrack.rule=Host(`track.topagenda.online`)"
        - "traefik.http.routers.leadtrack.entrypoints=websecure"
        - "traefik.http.routers.leadtrack.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.leadtrack.loadbalancer.server.port=8080"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: leads_db
      POSTGRES_USER: leads_user
      POSTGRES_PASSWORD: leads_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leads_user -d leads_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal
    deploy:
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    networks:
      - internal
    deploy:
      restart_policy:
        condition: on-failure

volumes:
  pgdata:
  redisdata:

networks:
  internal:
    driver: overlay
    attachable: true
  shared-net:
    external: true
